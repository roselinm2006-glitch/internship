<!DOCTYPE html>
<html>

<head>

    <style>
        body {
            background: black;
            color: white;
            font-family: Poppins;
        }

        .about {
            display: flex;
            gap: 50px;
            padding: 50px;
        }

        .about img {
            width: 500px;
            border-radius: 20px;
            border-right: 8px solid orangered;
        }

        .content {
            width: 600px;
        }

        h1 {
            text-align: center;
            font-size: 70px;
        }

        .menu {
            display: flex;
            gap: 40px;
            margin-top: 30px;
        }

        .menu h2 {
            border-bottom: 3px solid orangered;
            padding-bottom: 10px;
        }

        .orange {
            color: orangered;
        }
    </style>

</head>

<body>

    <h1>About Me</h1>

    <section class="about">

        <img src="image/profile.jpg">

        <div class="content">

            <p>
                I am a technology enthusiast with passion for Front-End development.
            </p>

            <div class="menu">
                <h2>Skills</h2>
                <h2>Experience</h2>
                <h2>Education</h2>
            </div>

            <h3 class="orange">Languages</h3>
            <p>English, Tamil</p>

            <h3 class="orange">Front-End</h3>
            <p>HTML, CSS, Bootstrap, JavaScript</p>

            <h3 class="orange">Back-End</h3>
            <p>PHP, Python, MySQL</p>

            <h3 class="orange">Tools</h3>
            <p>GitHub, VS Code, Canva, Figma</p>

        </div>

    </section>

</body>

</html>
