<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            background: black;
            font-family: Georgia;
        }

        .skills {
            padding: 50px;
            color: rgb(241, 122, 122);
        }

        .title-btn {
            background: #8b6508;
            color: rgb(199, 99, 99);
            padding: 15px 35px;
            border: none;
            border-radius: 40px;
            font-size: 20px;
        }

        .main-title {
            color: #c99700;
            font-size: 60px;
            margin-top: 20px;
        }

        .subtitle {
            font-size: 22px;
            margin-bottom: 50px;
        }

        .skill-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            background: #f1f1f1;
            width: 500px;
            padding: 35px;
            border-radius: 25px;
        }

        .card h2 {
            font-size: 40px;
        }

        .tag {
            display: inline-block;
            background: #ece6d9;
            color: #a77a00;
            padding: 12px 25px;
            border-radius: 30px;
            margin: 10px;
            font-size: 22px;
        }
    </style>
</head>

<body>

    <section class="skills">

        <button class="title-btn">Skills & Expertise</button>

        <h1 class="main-title">Technical Skills</h1>

        <p class="subtitle">
            Technologies and tools I use to design and develop modern web solutions
        </p>

        <div class="skill-container">

            <div class="card">
                <h2>Frontend</h2>

                <span class="tag">HTML</span>
                <span class="tag">CSS</span>
                <span class="tag">JavaScript</span>
                <span class="tag">Bootstrap</span>
            </div>

            <div class="card">
                <h2>Backend / CMS</h2>

                <span class="tag">WordPress</span>
                <span class="tag">PHP</span>
                <span class="tag">MySQL</span>
            </div>

            <div class="card">
                <h2>Design Tools</h2>

                <span class="tag">Photoshop</span>
                <span class="tag">Canva</span>
                <span class="tag">Figma</span>
            </div>

            <div class="card">
                <h2>Dev Tools</h2>

                <span class="tag">GitHub</span>
                <span class="tag">VPS Server</span>
            </div>

        </div>

    </section>

</body>

</html>
